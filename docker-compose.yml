version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vpms_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: vpms_backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/vpms
      - JWT_SECRET=vpms_super_secret_key_antigravity_2026
      - JWT_EXPIRE=24h
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: vpms_frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  mongo-data:
